# fly.toml app configuration file generated for bidframe-api on 2026-07-04T20:06:47+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bidframe-api'
primary_region = 'lhr'

[build]
  dockerfile = 'backend/Dockerfile'

# Two processes, one image: the legacy API (retired at cutover) and the production
# queue worker (backend/worker.py — claims extraction/draft jobs from Supabase, so a
# deploy/restart never loses a job). Worker secrets, before first deploy:
#   fly secrets set DATABASE_URL=... SUPABASE_URL=... SUPABASE_SERVICE_ROLE_KEY=...
# (see docs/setup-production.md)
[processes]
  app = "sh -c 'uvicorn backend.app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
  worker = "python -m backend.worker"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048

[mounts]
  source = "bidframe_data"
  destination = "/data"
